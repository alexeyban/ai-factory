services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9093:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      SCHEMA_REGISTRY_HOST_NAME: schema-registry

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  temporal:
    image: temporalio/auto-setup:1.22.0
    depends_on:
      - postgres
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_SEEDS=postgres
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
    ports:
      - "7233:7233"

  temporal-web:
    image: temporalio/ui:latest
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8080
    ports:
      - "8080:8080"

  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    depends_on:
      - temporal
      - kafka
      - schema-registry
    volumes:
      - ./workspace:/workspace
      - ${HOME}/.ssh:/root/.ssh:ro
      - ${HOME}/.gitconfig:/root/.gitconfig:ro
      - ${SSH_AUTH_SOCK}:${SSH_AUTH_SOCK}
      - ${HOME}/.claude:/root/.claude:ro
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - KAFKA_BOOTSTRAP=kafka:9092
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081
      - GIT_SSH_COMMAND=ssh -o StrictHostKeyChecking=yes
      - SSH_AUTH_SOCK=${SSH_AUTH_SOCK}
      - LLM_RESET_COOLDOWNS=true
    env_file:
      - .env

  dev-worker:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    command: python orchestrator/agent_worker.py
    depends_on:
      - temporal
    volumes:
      - ./workspace:/workspace
      - ${HOME}/.ssh:/root/.ssh:ro
      - ${HOME}/.gitconfig:/root/.gitconfig:ro
      - ${SSH_AUTH_SOCK}:${SSH_AUTH_SOCK}
      - ${HOME}/.claude:/root/.claude:ro
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - AGENT_TYPE=dev
      - TASK_QUEUE=dev-agent-tasks
      - GIT_SSH_COMMAND=ssh -o StrictHostKeyChecking=yes
      - SSH_AUTH_SOCK=${SSH_AUTH_SOCK}
    env_file:
      - .env

  qa-worker:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    command: python orchestrator/agent_worker.py
    depends_on:
      - temporal
    volumes:
      - ./workspace:/workspace
      - ${HOME}/.ssh:/root/.ssh:ro
      - ${HOME}/.gitconfig:/root/.gitconfig:ro
      - ${SSH_AUTH_SOCK}:${SSH_AUTH_SOCK}
      - ${HOME}/.claude:/root/.claude:ro
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - AGENT_TYPE=qa
      - TASK_QUEUE=qa-agent-tasks
      - GIT_SSH_COMMAND=ssh -o StrictHostKeyChecking=yes
      - SSH_AUTH_SOCK=${SSH_AUTH_SOCK}
    env_file:
      - .env

  refactor-worker:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    command: python orchestrator/agent_worker.py
    depends_on:
      - temporal
    volumes:
      - ./workspace:/workspace
      - ${HOME}/.ssh:/root/.ssh:ro
      - ${HOME}/.gitconfig:/root/.gitconfig:ro
      - ${SSH_AUTH_SOCK}:${SSH_AUTH_SOCK}
      - ${HOME}/.claude:/root/.claude:ro
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - AGENT_TYPE=refactor
      - TASK_QUEUE=refactor-agent-tasks
      - GIT_SSH_COMMAND=ssh -o StrictHostKeyChecking=yes
      - SSH_AUTH_SOCK=${SSH_AUTH_SOCK}
    env_file:
      - .env

  setup-worker:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    command: python orchestrator/agent_worker.py
    depends_on:
      - temporal
    volumes:
      - ./workspace:/workspace
      - ${HOME}/.ssh:/root/.ssh:ro
      - ${HOME}/.gitconfig:/root/.gitconfig:ro
      - ${SSH_AUTH_SOCK}:${SSH_AUTH_SOCK}
      - ${HOME}/.claude:/root/.claude:ro
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - AGENT_TYPE=setup
      - TASK_QUEUE=setup-agent-tasks
      - GIT_SSH_COMMAND=ssh -o StrictHostKeyChecking=yes
      - SSH_AUTH_SOCK=${SSH_AUTH_SOCK}
    env_file:
      - .env

  docs-worker:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    command: python orchestrator/agent_worker.py
    depends_on:
      - temporal
    volumes:
      - ./workspace:/workspace
      - ${HOME}/.ssh:/root/.ssh:ro
      - ${HOME}/.gitconfig:/root/.gitconfig:ro
      - ${SSH_AUTH_SOCK}:${SSH_AUTH_SOCK}
      - ${HOME}/.claude:/root/.claude:ro
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - AGENT_TYPE=docs
      - TASK_QUEUE=docs-agent-tasks
      - GIT_SSH_COMMAND=ssh -o StrictHostKeyChecking=yes
      - SSH_AUTH_SOCK=${SSH_AUTH_SOCK}
    env_file:
      - .env

  memory-worker:
    build:
      context: .
      dockerfile: infra/dockerfiles/memory-worker.Dockerfile
    depends_on:
      - postgres
      - qdrant
      - kafka
    ports:
      - "9091:9091"
    environment:
      - MEMORY_DB_URL=${MEMORY_DB_URL:-postgresql://temporal:temporal@postgres:5432/ai_factory_memory}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - KAFKA_BOOTSTRAP=${KAFKA_BOOTSTRAP:-kafka:9092}
      - METRICS_PORT=9091
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_ENDPOINT:-http://otel-collector:4317}
      - OTEL_SERVICE_NAME=memory-worker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    env_file:
      - .env

  reward-worker:
    build:
      context: .
      dockerfile: infra/dockerfiles/reward-worker.Dockerfile
    depends_on:
      - kafka
      - memory-worker
    environment:
      - MEMORY_DB_URL=${MEMORY_DB_URL:-postgresql://temporal:temporal@postgres:5432/ai_factory_memory}
      - KAFKA_BOOTSTRAP=${KAFKA_BOOTSTRAP:-kafka:9092}
      - REWARD_CORRECTNESS_W=${REWARD_CORRECTNESS_W:-1.0}
      - REWARD_PERF_W=${REWARD_PERF_W:-0.3}
      - REWARD_COMPLEXITY_W=${REWARD_COMPLEXITY_W:-0.2}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_ENDPOINT:-http://otel-collector:4317}
      - OTEL_SERVICE_NAME=reward-worker
    env_file:
      - .env

  meta-agent:
    build:
      context: .
      dockerfile: infra/dockerfiles/meta-agent.Dockerfile
    depends_on:
      - temporal
      - memory-worker
      - kafka
    environment:
      - MEMORY_DB_URL=${MEMORY_DB_URL:-postgresql://temporal:temporal@postgres:5432/ai_factory_memory}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - KAFKA_BOOTSTRAP=${KAFKA_BOOTSTRAP:-kafka:9092}
      - SKILL_OPTIMIZE_EVERY_N=${SKILL_OPTIMIZE_EVERY_N:-10}
    env_file:
      - .env

  otel-collector:
    image: otel/opentelemetry-collector:latest
    volumes:
      - ./infra/otel-collector.yml:/etc/otel-collector-config.yml
    command: ["--config=/etc/otel-collector-config.yml"]
    ports:
      - "4317:4317"
      - "4318:4318"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme_grafana}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./infra/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus

volumes:
  postgres-data:
  qdrant_data:
  prometheus_data:
  grafana_data:
