version: "3.9"

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9093:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      SCHEMA_REGISTRY_HOST_NAME: schema-registry

  dev_agent:
    build:
      context: .
      dockerfile: agents/dev/Dockerfile
    depends_on:
      - kafka
    volumes:
      - ./workspace:/workspace
    env_file:
      - .env

  qa_agent:
    build:
      context: .
      dockerfile: agents/qa/Dockerfile
    depends_on:
      - kafka
    volumes:
      - ./workspace:/workspace
    env_file:
      - .env

  architect_agent:
    build:
      context: .
      dockerfile: agents/architect/Dockerfile
    depends_on:
      - kafka
    env_file:
      - .env

  analyst_agent:
    build:
      context: .
      dockerfile: agents/analyst/Dockerfile
    depends_on:
      - kafka
    volumes:
      - ./workspace:/workspace
    env_file:
      - .env